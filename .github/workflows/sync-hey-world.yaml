name: Sync Hey World posts

on:
  schedule:
    - cron: '0 8 * * *'   # 08:00 UTC = 03:00 CT
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

concurrency:
  group: sync-hey-world
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    environment: dev

    env:
      RESOURCE_GROUP_NAME: rg-website-dev
      FN_NAME: func-website-dev-scus-001
      FN_RG: rg-website-dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Sync content ───────────────────────────────────────────────
      - name: Install Babashka
        run: |
          curl -sL "https://raw.githubusercontent.com/babashka/babashka/master/install" \
            | sudo bash

      - name: Sync Hey World posts
        id: sync
        run: |
          bb scripts/sync-hey-world.bb | tee /tmp/sync-output.txt
          COUNT=$(grep -oP '(?<=new=)\d+' /tmp/sync-output.txt || echo 0)
          echo "new_posts=$COUNT" >> "$GITHUB_OUTPUT"
          echo "New posts: $COUNT"

      - name: Commit new posts
        if: steps.sync.outputs.new_posts != '0'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add resources/content/
          git commit -m "Sync Hey World posts [skip ci]

          $(grep '+' /tmp/sync-output.txt || true)

          Co-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>"
          git push

      # ── JVM toolchain ──────────────────────────────────────────────
      - name: Set up Java 21
        if: steps.sync.outputs.new_posts != '0'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Clojure CLI
        if: steps.sync.outputs.new_posts != '0'
        uses: DeLaGuardo/setup-clojure@13.2
        with:
          cli: latest

      - name: Cache JVM dependencies
        if: steps.sync.outputs.new_posts != '0'
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.cpcache
          key: ${{ runner.os }}-jvm-${{ hashFiles('deps.edn') }}
          restore-keys: |
            ${{ runner.os }}-jvm-

      # ── Azure login ────────────────────────────────────────────────
      - name: Login with OIDC
        if: steps.sync.outputs.new_posts != '0'
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          auth-type: SERVICE_PRINCIPAL
          audience: api://AzureADTokenExchange

      # ── Build ──────────────────────────────────────────────────────
      - name: Run tests
        if: steps.sync.outputs.new_posts != '0'
        run: clojure -M:test

      - name: Build uberjar
        if: steps.sync.outputs.new_posts != '0'
        timeout-minutes: 10
        run: clojure -T:build uber

      # ── Deploy ─────────────────────────────────────────────────────
      - name: Create deployment archive
        if: steps.sync.outputs.new_posts != '0'
        run: |
          zip -r deploy.zip \
            host.json \
            Health/function.json \
            Pages/function.json \
            target/website-0.1.0.jar

      - name: Deploy to Azure Functions
        if: steps.sync.outputs.new_posts != '0'
        timeout-minutes: 10
        run: |
          az functionapp deployment source config-zip \
            --name "$FN_NAME" \
            --resource-group "$FN_RG" \
            --src deploy.zip \
            --build-remote false \
            --timeout 120 || true

      # ── Mastodon announcements ─────────────────────────────────────
      - name: Post to Mastodon
        if: steps.sync.outputs.new_posts != '0'
        env:
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
        run: |
          python3 <<'EOF'
          import json, urllib.request, urllib.parse, os

          token  = os.environ["MASTODON_ACCESS_TOKEN"]
          posts  = json.load(open("/tmp/new-posts.json"))
          base   = "https://www.acestus.com/blog"

          for p in posts:
              slug    = p["slug"]
              title   = p["title"]
              message = f"New post: {title}\n\n{base}/{slug}"
              data    = urllib.parse.urlencode({"status": message}).encode()
              req     = urllib.request.Request(
                  "https://social.linux.pizza/api/v1/statuses",
                  data=data,
                  headers={"Authorization": f"Bearer {token}"},
              )
              with urllib.request.urlopen(req) as r:
                  body = json.loads(r.read())
                  print(f"  ✓ Posted: {body.get('url')}")
          EOF

      - name: Summary
        if: always()
        run: |
          echo "## Sync Summary" >> $GITHUB_STEP_SUMMARY
          echo "**New posts:** ${{ steps.sync.outputs.new_posts }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.sync.outputs.new_posts }}" != "0" ]; then
            echo "✅ Deployed to $FN_NAME" >> $GITHUB_STEP_SUMMARY
          else
            echo "⏭️ No new posts — skipped deploy" >> $GITHUB_STEP_SUMMARY
          fi
