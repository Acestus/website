name: Sync Hey World posts

on:
  schedule:
    - cron: '33 14 * * *'   # 14:33 UTC = 09:33 CDT
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

concurrency:
  group: sync-hey-world
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    environment: dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity and credentials
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global url."https://x-access-token:${{ secrets.BLOG_SYNC_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Install Babashka
        run: |
          curl -sL "https://raw.githubusercontent.com/babashka/babashka/master/install" \
            | sudo bash

      - name: Sync Hey World posts (classify + route to blog-cloud / blog-history / blog-christian)
        id: sync
        run: |
          bb scripts/sync-hey-world.bb | tee /tmp/sync-output.txt
          COUNT=$(grep -oP '(?<=new=)\d+' /tmp/sync-output.txt || echo 0)
          echo "new_posts=$COUNT" >> "$GITHUB_OUTPUT"
          echo "New posts: $COUNT"

      - name: Commit sync state
        if: steps.sync.outputs.new_posts != '0'
        run: |
          git add .hey-world-synced.edn
          git commit -m "Update Hey World sync state [skip ci]" || echo "nothing to commit"
          git push

      # ── Mastodon announcements ─────────────────────────────────────
      - name: Post to Mastodon
        if: steps.sync.outputs.new_posts != '0'
        env:
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
        run: |
          python3 <<'EOF'
          import json, urllib.request, urllib.parse, os

          token  = os.environ["MASTODON_ACCESS_TOKEN"]
          posts  = json.load(open("/tmp/new-posts.json"))
          limit  = 500

          for p in posts:
              title  = p["title"]
              body   = p.get("body", "")
              url    = p.get("url", "")
              footer = f"\n\nOriginally published at {url}"
              header = f"{title}\n\n"
              room   = limit - len(header) - len(footer) - 1  # -1 for "…"
              if len(body) > room:
                  trimmed = body[:room]
                  cut = trimmed.rfind(" ")
                  body = (trimmed[:cut] if cut > 0 else trimmed) + "…"
              message = header + body + footer
              data    = urllib.parse.urlencode({"status": message}).encode()
              req     = urllib.request.Request(
                  "https://social.linux.pizza/api/v1/statuses",
                  data=data,
                  headers={"Authorization": f"Bearer {token}"},
              )
              with urllib.request.urlopen(req) as r:
                  body_resp = json.loads(r.read())
                  print(f"  ✓ Posted: {body_resp.get('url')}")
          EOF

      # ── Dev.to ────────────────────────────────────────────────────────────
      - name: Publish to Dev.to
        if: steps.sync.outputs.new_posts != '0'
        env:
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
        run: |
          python3 <<'EOF'
          import json, urllib.request, os

          api_key = os.environ.get("DEVTO_API_KEY", "")
          if not api_key:
              print("  ⏭ DEVTO_API_KEY not configured — skipping")
              raise SystemExit(0)

          posts = json.load(open("/tmp/new-posts.json"))

          for post in posts:
              body = post.get("body", "")
              url  = post.get("url", "")
              data = json.dumps({
                  "article": {
                      "title":         post["title"],
                      "body_markdown": body,
                      "published":     True,
                      "canonical_url": url,
                  }
              }).encode()
              req = urllib.request.Request(
                  "https://dev.to/api/articles",
                  data=data,
                  headers={
                      "api-key":      api_key,
                      "Content-Type": "application/json",
                  },
              )
              with urllib.request.urlopen(req) as r:
                  resp = json.loads(r.read())
                  respurl  = resp.get("url", "?")
                  print(f"  ✓ Dev.to: {respurl}")
          EOF

      - name: Summary
        if: always()
        run: |
          echo "## Sync Summary" >> $GITHUB_STEP_SUMMARY
          echo "**New posts:** ${{ steps.sync.outputs.new_posts }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.sync.outputs.new_posts }}" != "0" ]; then
            echo "✅ Routed to blog-cloud / blog-history / blog-christian (each deploys via its own CI/CD)" >> $GITHUB_STEP_SUMMARY
          else
            echo "⏭️ No new posts — nothing to route" >> $GITHUB_STEP_SUMMARY
          fi
