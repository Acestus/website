name: Sync Hey World posts

on:
  schedule:
    - cron: '33 14 * * *'   # 14:33 UTC = 09:33 CDT
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

concurrency:
  group: sync-hey-world
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    environment: dev

    env:
      RESOURCE_GROUP_NAME: rg-website-dev
      FN_NAME: func-website-dev-scus-001
      FN_RG: rg-website-dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Sync content ───────────────────────────────────────────────
      - name: Install Babashka
        run: |
          curl -sL "https://raw.githubusercontent.com/babashka/babashka/master/install" \
            | sudo bash

      - name: Sync Hey World posts
        id: sync
        run: |
          bb scripts/sync-hey-world.bb | tee /tmp/sync-output.txt
          COUNT=$(grep -oP '(?<=new=)\d+' /tmp/sync-output.txt || echo 0)
          echo "new_posts=$COUNT" >> "$GITHUB_OUTPUT"
          echo "New posts: $COUNT"

      - name: Commit new posts
        if: steps.sync.outputs.new_posts != '0'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add resources/content/
          git commit -m "Sync Hey World posts [skip ci]

          $(grep '+' /tmp/sync-output.txt || true)

          Co-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>"
          git push

      # ── JVM toolchain ──────────────────────────────────────────────
      - name: Set up Java 21
        if: steps.sync.outputs.new_posts != '0'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Clojure CLI
        if: steps.sync.outputs.new_posts != '0'
        uses: DeLaGuardo/setup-clojure@13.2
        with:
          cli: latest

      - name: Cache JVM dependencies
        if: steps.sync.outputs.new_posts != '0'
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.cpcache
          key: ${{ runner.os }}-jvm-${{ hashFiles('deps.edn') }}
          restore-keys: |
            ${{ runner.os }}-jvm-

      # ── Azure login ────────────────────────────────────────────────
      - name: Login with OIDC
        if: steps.sync.outputs.new_posts != '0'
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          auth-type: SERVICE_PRINCIPAL
          audience: api://AzureADTokenExchange

      # ── Build ──────────────────────────────────────────────────────
      - name: Run tests
        if: steps.sync.outputs.new_posts != '0'
        run: clojure -M:test

      - name: Build uberjar
        if: steps.sync.outputs.new_posts != '0'
        timeout-minutes: 10
        run: clojure -T:build uber

      # ── Deploy ─────────────────────────────────────────────────────
      - name: Create deployment archive
        if: steps.sync.outputs.new_posts != '0'
        run: |
          zip -r deploy.zip \
            host.json \
            Health/function.json \
            Pages/function.json \
            target/website-0.1.0.jar

      - name: Deploy to Azure Functions
        if: steps.sync.outputs.new_posts != '0'
        timeout-minutes: 10
        run: |
          az functionapp deployment source config-zip \
            --name "$FN_NAME" \
            --resource-group "$FN_RG" \
            --src deploy.zip \
            --build-remote false \
            --timeout 120 || true

      # ── Mastodon announcements ─────────────────────────────────────
      - name: Post to Mastodon
        if: steps.sync.outputs.new_posts != '0'
        env:
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
        run: |
          python3 <<'EOF'
          import json, urllib.request, urllib.parse, os

          token  = os.environ["MASTODON_ACCESS_TOKEN"]
          posts  = json.load(open("/tmp/new-posts.json"))
          base   = "https://www.acestus.com/blog"
          limit  = 500

          for p in posts:
              slug   = p["slug"]
              title  = p["title"]
              body   = p.get("body", "")
              footer = f"\n\nOriginally published at {base}/{slug}"
              header = f"{title}\n\n"
              room   = limit - len(header) - len(footer) - 1  # -1 for "…"
              if len(body) > room:
                  # trim at last space within room
                  trimmed = body[:room]
                  cut = trimmed.rfind(" ")
                  body = (trimmed[:cut] if cut > 0 else trimmed) + "…"
              message = header + body + footer
              data    = urllib.parse.urlencode({"status": message}).encode()
              req     = urllib.request.Request(
                  "https://social.linux.pizza/api/v1/statuses",
                  data=data,
                  headers={"Authorization": f"Bearer {token}"},
              )
              with urllib.request.urlopen(req) as r:
                  body_resp = json.loads(r.read())
                  print(f"  ✓ Posted: {body_resp.get('url')}")
          EOF

      # ── X.com announcement ────────────────────────────────────────────────
      - name: Post to X.com
        if: steps.sync.outputs.new_posts != '0'
        env:
          X_API_KEY:             ${{ secrets.X_API_KEY }}
          X_API_SECRET:          ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN:        ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: |
          python3 <<'EOF'
          import hmac, hashlib, base64, time, uuid, urllib.parse, json, urllib.request, os

          api_key      = os.environ.get("X_API_KEY", "")
          api_secret   = os.environ.get("X_API_SECRET", "")
          access_token = os.environ.get("X_ACCESS_TOKEN", "")
          token_secret = os.environ.get("X_ACCESS_TOKEN_SECRET", "")

          if not all([api_key, api_secret, access_token, token_secret]):
              print("  ⏭ X.com secrets not configured — skipping")
              raise SystemExit(0)

          def oauth_header(url):
              p = {
                  'oauth_consumer_key':     api_key,
                  'oauth_nonce':            uuid.uuid4().hex,
                  'oauth_signature_method': 'HMAC-SHA1',
                  'oauth_timestamp':        str(int(time.time())),
                  'oauth_token':            access_token,
                  'oauth_version':          '1.0',
              }
              base_params = '&'.join(
                  f"{urllib.parse.quote(k, safe='')}={urllib.parse.quote(v, safe='')}"
                  for k, v in sorted(p.items())
              )
              sig_base = '&'.join([
                  'POST',
                  urllib.parse.quote(url, safe=''),
                  urllib.parse.quote(base_params, safe=''),
              ])
              sign_key = f"{urllib.parse.quote(api_secret, safe='')}&{urllib.parse.quote(token_secret, safe='')}"
              sig = base64.b64encode(
                  hmac.new(sign_key.encode(), sig_base.encode(), hashlib.sha1).digest()
              ).decode()
              p['oauth_signature'] = sig
              return 'OAuth ' + ', '.join(
                  f'{urllib.parse.quote(k, safe="")}="{urllib.parse.quote(v, safe="")}"'
                  for k, v in sorted(p.items())
              )

          posts = json.load(open("/tmp/new-posts.json"))
          base  = "https://www.acestus.com/blog"
          limit = 280

          for post in posts:
              slug   = post["slug"]
              title  = post["title"]
              body   = post.get("body", "")
              footer = f"\n\nOriginally published at {base}/{slug}"
              header = f"{title}\n\n"
              room   = limit - len(header) - len(footer) - 1
              if len(body) > room:
                  trimmed = body[:room]
                  cut = trimmed.rfind(" ")
                  body = (trimmed[:cut] if cut > 0 else trimmed) + "…"
              message = header + body + footer
              url     = "https://api.twitter.com/2/tweets"
              data    = json.dumps({"text": message}).encode()
              req     = urllib.request.Request(
                  url, data=data,
                  headers={
                      "Authorization": oauth_header(url),
                      "Content-Type":  "application/json",
                  },
              )
              with urllib.request.urlopen(req) as r:
                  resp = json.loads(r.read())
                  tid  = resp.get("data", {}).get("id", "?")
                  print(f"  ✓ Tweeted: https://x.com/i/web/status/{tid}")
          EOF

      # ── Medium ────────────────────────────────────────────────────────────
      - name: Publish to Medium
        if: steps.sync.outputs.new_posts != '0'
        env:
          MEDIUM_TOKEN: ${{ secrets.MEDIUM_TOKEN }}
        run: |
          python3 <<'EOF'
          import json, urllib.request, os

          token = os.environ.get("MEDIUM_TOKEN", "")
          if not token:
              print("  ⏭ MEDIUM_TOKEN not configured — skipping")
              raise SystemExit(0)

          def api(method, path, body=None):
              req = urllib.request.Request(
                  f"https://api.medium.com/v1{path}",
                  data=json.dumps(body).encode() if body else None,
                  method=method,
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Content-Type":  "application/json",
                      "Accept":        "application/json",
                  },
              )
              with urllib.request.urlopen(req) as r:
                  return json.loads(r.read())

          user_id = api("GET", "/me")["data"]["id"]
          posts   = json.load(open("/tmp/new-posts.json"))
          base    = "https://www.acestus.com/blog"

          for post in posts:
              slug = post["slug"]
              html = open(f"resources/content/posts/{slug}.html").read()
              result = api("POST", f"/users/{user_id}/posts", {
                  "title":         post["title"],
                  "contentFormat": "html",
                  "content":       html,
                  "publishStatus": "public",
                  "canonicalUrl":  f"{base}/{slug}",
              })
              url = result.get("data", {}).get("url", "?")
              print(f"  ✓ Medium: {url}")
          EOF

      # ── Dev.to ────────────────────────────────────────────────────────────
      - name: Publish to Dev.to
        if: steps.sync.outputs.new_posts != '0'
        env:
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
        run: |
          python3 <<'EOF'
          import json, urllib.request, os

          api_key = os.environ.get("DEVTO_API_KEY", "")
          if not api_key:
              print("  ⏭ DEVTO_API_KEY not configured — skipping")
              raise SystemExit(0)

          posts = json.load(open("/tmp/new-posts.json"))
          base  = "https://www.acestus.com/blog"

          for post in posts:
              slug = post["slug"]
              html = open(f"resources/content/posts/{slug}.html").read()
              data = json.dumps({
                  "article": {
                      "title":         post["title"],
                      "body_markdown": html,
                      "published":     True,
                      "canonical_url": f"{base}/{slug}",
                  }
              }).encode()
              req = urllib.request.Request(
                  "https://dev.to/api/articles",
                  data=data,
                  headers={
                      "api-key":      api_key,
                      "Content-Type": "application/json",
                  },
              )
              with urllib.request.urlopen(req) as r:
                  resp = json.loads(r.read())
                  url  = resp.get("url", "?")
                  print(f"  ✓ Dev.to: {url}")
          EOF

      - name: Summary
        if: always()
        run: |
          echo "## Sync Summary" >> $GITHUB_STEP_SUMMARY
          echo "**New posts:** ${{ steps.sync.outputs.new_posts }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.sync.outputs.new_posts }}" != "0" ]; then
            echo "✅ Deployed to $FN_NAME" >> $GITHUB_STEP_SUMMARY
          else
            echo "⏭️ No new posts — skipped deploy" >> $GITHUB_STEP_SUMMARY
          fi
